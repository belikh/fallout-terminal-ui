title: "ROBCO INDUSTRIES - MASTER DEMO v2.0"
views:
  - title: "SHOWCASE: GREEN (DEFAULT)"
    path: "showcase-green"
    type: "sections"
    theme: "fallout_retro_green"
    sections:
      - title: "COMMAND CENTER"
        cards:
          - type: "custom:fallout-vaultboy-status-card"
            title: "OVERSEER STATUS"
            animation: "thumbs_up"
            color: "#9cff57"
          - type: "custom:fallout-boot-card"
          - type: "grid"
            columns: 2
            cards:
              - type: "custom:fallout-mainframe-card"
                entity: "sensor.vault_mainframe_core_status"
              - type: "custom:fallout-rad-card"
                entity: "sensor.radiation_levels"

      - title: "INTERACTIVE CONTROLS"
        cards:
          - type: "grid"
            columns: 2
            cards:
              - type: "custom:fallout-switch-card"
                entity: "switch.power_relay"
              - type: "custom:fallout-lock-card"
                entity: "lock.vault_main_door"
              - type: "custom:fallout-sequence-card"
                entity: "script.init_purge"
              - type: "custom:fallout-estop-card"

      - title: "S.P.E.C.I.A.L. MATRIX"
        cards:
          - type: "custom:fallout-special-card"
          - type: "grid"
            columns: 4
            cards:
              - type: "custom:fallout-vault-boy"
                animation: "strength"
              - type: "custom:fallout-vault-boy"
                animation: "perception"
              - type: "custom:fallout-vault-boy"
                animation: "endurance"
              - type: "custom:fallout-vault-boy"
                animation: "charisma"
              - type: "custom:fallout-vault-boy"
                animation: "intelligence"
              - type: "custom:fallout-vault-boy"
                animation: "agility"
              - type: "custom:fallout-vault-boy"
                animation: "luck"
              - type: "custom:fallout-vault-boy"
                animation: "hacking"

      - title: "SYSTEM MODULES GALLERY"
        cards:
          - type: "grid"
            columns: 2
            cards:
              - type: "custom:fallout-vats-card"
              - type: "custom:fallout-map-card"
              - type: "custom:fallout-quest-card"
              - type: "custom:fallout-inventory-card"
              - type: "custom:fallout-workshop-card"
              - type: "custom:fallout-radio-card"

  - title: "SHOWCASE: AMBER (NEW VEGAS)"
    path: "showcase-amber"
    type: "sections"
    theme: "fallout_retro_amber"
    sections:
      - title: "COMMAND CENTER"
        cards:
          - type: "custom:fallout-vaultboy-status-card"
            title: "OVERSEER STATUS"
            animation: "thumbs_up"
            color: "#ffb642"
          - type: "custom:fallout-boot-card"
          - type: "custom:fallout-map-card"
          - type: "grid"
            columns: 2
            cards:
              - type: "custom:fallout-mainframe-card"
                entity: "sensor.vault_mainframe_core_status"
              - type: "custom:fallout-rad-card"
                entity: "sensor.radiation_levels"

  - title: "SHOWCASE: BLUE (76)"
    path: "showcase-blue"
    type: "sections"
    theme: "fallout_retro_blue"
    sections:
      - title: "COMMAND CENTER"
        cards:
          - type: "custom:fallout-vaultboy-status-card"
            title: "OVERSEER STATUS"
            animation: "thumbs_up"
            color: "#42b6ff"
          - type: "custom:fallout-boot-card"
          - type: "custom:fallout-radio-card"
          - type: "grid"
            columns: 2
            cards:
              - type: "custom:fallout-mainframe-card"
                entity: "sensor.vault_mainframe_core_status"
              - type: "custom:fallout-rad-card"
                entity: "sensor.radiation_levels"
