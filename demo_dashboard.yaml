# RobCo Industries — demo dashboard for the Fallout design system.
#
# Replace the example entity IDs (sensor.*, switch.*, etc.) with your own. Every card binds to real
# entities; nothing here is simulated. Duplicate a view and change its `theme:` to see the suite
# re-skin (green / amber / blue).

title: "ROBCO TERMLINK"
views:
  - title: "VAULT STATUS"
    path: vault-status
    theme: fallout_retro_green
    type: sections
    sections:
      - title: "DIAGNOSTICS"
        cards:
          - type: custom:fallout-gauge-card
            entity: sensor.cpu_temperature
            name: CORE TEMP
            min: 0
            max: 100
            unit: "°C"
            segments:
              - { to: 60, color: "var(--fallout-accent)" }
              - { to: 80, color: "var(--fallout-warn)" }
              - { to: 100, color: "var(--fallout-alert)" }
          - type: custom:fallout-gauge-card
            entity: sensor.battery_level
            name: RESERVE POWER
            min: 0
            max: 100
            unit: "%"
            invert: true
            segments:
              - { to: 20, color: "var(--fallout-alert)" }
              - { to: 50, color: "var(--fallout-warn)" }
              - { to: 100, color: "var(--fallout-accent)" }
          - type: custom:fallout-status-card
            entity: binary_sensor.front_door
            name: VAULT DOOR
            states:
              "on": { label: OPEN, level: warn }
              "off": { label: SEALED, level: ok }

      - title: "CONTROLS"
        cards:
          - type: custom:fallout-control-card
            entity: switch.living_room
            name: PERIMETER LIGHTS
          - type: custom:fallout-control-card
            entity: lock.front_door
            name: BLAST DOOR
          - type: custom:fallout-control-card
            entity: input_number.thermostat_target
            name: CLIMATE VALVE

      - title: "MONITOR"
        cards:
          - type: custom:fallout-vaultboy-card
            entity: binary_sensor.motion
            name: SECURITY MONITOR
            default_animation: thumbs_up
            mappings:
              - { state: "on", animation: alert, level: alert }
          - type: custom:fallout-terminal-card
            entity: switch.living_room
            title: DEVICE LOG
            show_attributes: true

  - title: "DWELLER"
    path: dweller
    theme: fallout_retro_amber
    type: sections
    sections:
      - title: "S.T.A.T.S."
        cards:
          - type: custom:fallout-stats-card
            title: VAULT DWELLER
            weight_entity: sensor.body_weight
            bmi_entity: sensor.bmi
            stats:
              - { label: BODY FAT, entity: sensor.body_fat, min: 0, max: 40, healthy_max: 22, unit: "%" }
              - { label: MUSCLE, entity: sensor.muscle_mass, min: 0, max: 60, healthy_min: 35, unit: "%" }
              - { label: WATER, entity: sensor.body_water, min: 0, max: 80, healthy_min: 45, unit: "%" }
