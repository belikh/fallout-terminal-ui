# RobCo Industries — Fallout Terminal themes.
#
# Each theme sets the standard Home Assistant variables (so the whole dashboard matches) AND the
# --fallout-* design tokens that the custom cards consume. Selecting a theme therefore re-skins the
# entire card suite; the cards fall back to phosphor green when no Fallout theme is active.

fallout_retro_green:
  # Standard Home Assistant variables
  primary-background-color: "#0b0f0a"
  secondary-background-color: "#11160f"
  card-background-color: "#0b0f0a"
  ha-card-background: "#0b0f0a"
  primary-text-color: "#b8ff9a"
  secondary-text-color: "#7abf63"
  disabled-text-color: "#4d7a3d"
  primary-color: "#9cff57"
  accent-color: "#d8ff8a"
  warning-color: "#e6c15a"
  error-color: "#ff6b5e"
  success-color: "#7dff8f"
  divider-color: "rgba(156, 255, 87, 0.18)"
  paper-item-icon-color: "#7abf63"
  paper-item-icon-active-color: "#9cff57"
  ha-card-border-radius: "6px"
  ha-card-box-shadow: "0 0 0 1px rgba(156,255,87,0.14), 0 8px 24px rgba(0,0,0,0.45)"
  primary-font-family: "Share Tech Mono, IBM Plex Mono, Courier New, monospace"
  paper-font-common-base_-_font-family: "Share Tech Mono, IBM Plex Mono, Courier New, monospace"
  # Fallout design tokens (consumed by the custom cards)
  fallout-accent: "#9cff57"
  fallout-accent-dim: "#5f9c3a"
  fallout-accent-soft: "rgba(156, 255, 87, 0.18)"
  fallout-text: "#b8ff9a"
  fallout-bg: "#0b0f0a"
  fallout-bg-elev: "#11160f"
  fallout-warn: "#e6c15a"
  fallout-alert: "#ff6b5e"
  fallout-glow: "rgba(156, 255, 87, 0.55)"
  fallout-radius: "6px"
  fallout-font: "Share Tech Mono, IBM Plex Mono, Courier New, monospace"
  fallout-scanline-opacity: "0.25"
  fallout-flicker-opacity: "0.04"
  card-mod-theme: fallout_retro_green

